name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs every 3 days at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase DB
        run: |
          curl -f -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/portfolio?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
